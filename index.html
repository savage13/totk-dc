<!DOCTYPE html>
<html lang="en">
  <!--
       @model Philidea.Website.Pages.totk_calculatorModel
       @Html.AntiForgeryToken()
    -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotK Damage Calculator</title>
    <meta name="description" content="A damage calculator for The Legend of Zelda: Tears of the Kingdom. Select your equipment and a target enemy to view the damage that would be dealt by the attack.">
    <link rel="canonical" href="https://philidea.com/totk-calculator" />

    <link rel="stylesheet" href="assets/bootstrap.min.css" />
    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="assets/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="assets/totk-dc.css" asp-append-version="true" />
    <link href="js/select2.min.css" rel="stylesheet" />
    <script src="js/select2.min.js"></script>
  </head>

  <body>
    <!--HEADER-->
    <header class="bg-black border-bottom box-shadow mb-3">
      <div class="container" style="display:flex; justify-content:space-between;">
        <label class="totk-title" style="color:white; font-size: 28px; padding:10px;">TEARS OF THE KINGDOM DAMAGE CALCULATOR</label>
        <div style="display:flex; flex-direction:column; align-items:flex-end;">
          <label style="font-size:10px; margin-top:2px; margin-right:4px;">1.2.3</label>
          <img src="assets/settings_icon.svg" class="settings-icon" onclick="openSettings()" alt="Settings Icon" />
        </div>
      </div>
    </header>

    <!--Settings-->
    <div id="settingsModalBackground" class="modal-background">
      <div id="settingsModal" class="modal">
        <div style="background:none; border:none;">
          <span class="modal-close" onclick="closeSettings()">&times;</span>
          <div style="margin-top:25px;">
            <h2 style="background:none;margin-left:-20px;">Settings</h2>
            <!--Settings Checkboxes-->
            <div>
              <label class="setting-label"><input asp-for="Input.FreeMode" id="checkboxFreeMode" class="form-check-input setting-box cookie" type="checkbox" xonchange="update()">Unrestricted Inputs</label>
              <br><label class="setting-label"><input asp-for="Input.TrueDamage" id="checkboxTrueDamage" class="form-check-input setting-box cookie" type="checkbox" xonchange="update()">Weapon Icon True Damage</label>
              <br><label class="setting-label"><input asp-for="Input.SortFuseByAttack" id="checkboxSortFuseByAttack" class="form-check-input setting-box cookie" type="checkbox" xonchange="updateFuseDropdown()">Sort Fuse By Attack Power</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function openSettings() {
          document.getElementById('settingsModalBackground').style.display = 'flex';
          var modal = document.getElementById('settingsModal');

          if (modal.style.display === 'block') {
              closeSettings();
          }
          else {
              modal.style.display = 'block';
          }
      }
      function closeSettings() {
          document.getElementById('settingsModalBackground').style.display = 'none';
          document.getElementById('settingsModal').style.display = 'none';
      }
      function setCookie(name, value, days) {
          var expires = "";
          if (days) {
              var date = new Date();
              date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
              expires = "; expires=" + date.toUTCString();
          }
          document.cookie = name + "=" + value + expires + "; path=/";
      }
      function getCookie(name) {
          var nameEQ = name + "=";
          var cookies = document.cookie.split(';');
          for (var i = 0; i < cookies.length; i++) {
              var cookie = cookies[i];
              while (cookie.charAt(0) === ' ') {
                  cookie = cookie.substring(1, cookie.length);
              }
              if (cookie.indexOf(nameEQ) === 0) {
                  return cookie.substring(nameEQ.length, cookie.length);
              }
          }
          return null;
      }
      function initializeSettings() {
          var freeModeCookie = getCookie("FreeMode");
          if (freeModeCookie !== null) {
              document.getElementById("checkboxFreeMode").checked = (freeModeCookie === "true");
          }

          var trueDamageCookie = getCookie("TrueDamage");
          if (trueDamageCookie !== null) {
              document.getElementById("checkboxTrueDamage").checked = (trueDamageCookie === "true");
          }
          var sortFuseByAttackCookie = getCookie("SortFuseByAttack");
          if (sortFuseByAttackCookie !== null) {
              document.getElementById("checkboxSortFuseByAttack").checked = (sortFuseByAttackCookie === "true");
              updateFuseDropdown();
          }
      }
      window.onload = function () {
          initializeSettings();
      };
      function handleCheckboxChange(checkboxId, cookieName) {
          var checkbox = document.getElementById(checkboxId);
          setCookie(cookieName, checkbox.checked, 400);
      }
      document.getElementById("checkboxFreeMode").addEventListener("change", function () {
          handleCheckboxChange("checkboxFreeMode", "FreeMode");
      });
      document.getElementById("checkboxTrueDamage").addEventListener("change", function () {
          handleCheckboxChange("checkboxTrueDamage", "TrueDamage");
      });
      document.getElementById("checkboxSortFuseByAttack").addEventListener("change", function () {
          handleCheckboxChange("checkboxSortFuseByAttack", "SortFuseByAttack");
      });
    </script>

    <!--BODY-->
    <div class="container">
      <main role="main" class="pb-3">
        <div class="container" >
          <!--WEAPON ROW/SECTION-->
          <div class="row section section-weapon">
            <div class="totk-title" style="height:10px; margin-left:-12px; position:relative;">
              <h2>WEAPON</h2>
            </div>

            <!--WEAPON-->
            <div class="col-md-auto py-2">
              <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Weapon</h5>
                <!--WEAPON RANDOMIZE-->
                <button type="button" class="btn btn-primary random" onclick="randomizeWeapon()">
                  <img src="assets/dice-shutterstock.webp" alt="Randomize" width="20" height="20" style="margin-left:5px;">
                </button>
              </div>
              <!--WEAPON DROPDOWN-->
              <select name="SelectedWeaponName" class="form-control select2" id="weaponDropdown" style="width:18rem;" xonchange="update('weapon');">
                <!--
                @if (Model.Weapons != null) {
                @foreach (var weapon in Model.Weapons) {
                <option value="@weapon.Name">@weapon.Name</option>
                }
                }
                -->
              </select>
              <div>
                <!--Zonaite Helm Checkbox-->
                <label id="zonaiteLabel" class="form-check-label d-block hidden" style="color:white; font-size:11px;">
                  <input asp-for="Input.Zonaite" id="checkboxZonaite" class="form-check-input" style="margin-right:3px" type="checkbox" xonchange="update()">Zonaite Helm
                </label>
                <!--Sage Will Checkbox-->
                <label id="sagewillLabel" class="form-check-label d-block hidden" style="color:white; font-size:11px;">
                  <input asp-for="Input.SageWill" id="checkboxSagewill" class="form-check-input" style="margin-right:3px" type="checkbox" xonchange="update()">Mineru Sage's Will</label>
              </div>
            </div>

            <!--ATTACK UP MOD-->

              <h5 style="margin-top:4px;">Attack Up Mod</h5>
              <div class="form-outline" style="width: 10rem;">
                <input asp-for="Input.AttackUpMod" class="form-control" id="numberAttackUpMod" type="number" value="0" min="0" max="0" step="3" xonchange="update()" xoninput="restrictAttackUpMod()"/>
              </div>
              <!--Critical Hit Checkbox-->
              <label id="criticalLabel" class="form-check-label d-block hidden" style="color:white; font-size:11px;">
                <input asp-for="Input.CriticalHitMod" id="checkboxCritical" class="form-check-input" style="margin-right:3px" type="checkbox" xonchange="update()">Critical Hit Mod
              </label>
              <!--Multishot Checkbox-->
              <label id="multishotLabel" class="form-check-label d-block hidden" style="color:white; font-size:11px;">
                <input asp-for="Input.Multishot" id="checkboxMultishot" class="form-check-input" style="margin-right:3px" type="checkbox" xonchange="update()">Multishot Mod
              </label>
            </div>

            <!--FUSE-->

              <div class="d-flex justify-content-between align-items-center">

                </button>
              </div>
              <!--FUSE DROPDOWN-->

                @if (Model.Fuses != null) {
                var FuseList = Model.Fuses.ToList();
                @foreach (var fuse in FuseList) {
                <option value="@fuse.Name" attack="@fuse.BaseAttack" default-order="@fuse.SortOrder">@fuse.Name (@fuse.BaseAttack)</option>
                }

              </select>

            </div>

            <!--ATTACK TYPE-->

                <option value="Flurry Rush">Flurry Rush</option>
                <option value="Combo Finisher">Combo Finisher</option>
                <option value="Sidon's Water">Sidon's Water</option>
                <option value="Horseback">Horseback</option>
              </select>
            </div>

            <!--BACKSCRATCHER BUTTON-->
            <button id="backscratcherButton" type="button" class="btn btn-primary backscratcher hidden" onclick="bestWeapon()">"Backscratcher"</button>
          </div>

          <!--PLAYER AND ENEMY ROW-->

              <div class="totk-title" style="height:10px; position:relative;">
                <h2>PLAYER</h2>
              </div>

              <div class="row">
                <!--CURRENT HEARTS-->
                <div class="col-md-auto py-2">
                  <h5>Current Hearts</h5>
                  <div class="form-outline" style="width: 6rem;">
                    <input asp-for="Input.HP" class="form-control" id="numberHP" type="number" value="38" step="0.25" min="0.25" max="40" xonchange="update()" />
                  </div>
                </div>

                <!--ARMOR/FOOD BUFF 1-->

                  <h5>Armor/Food Buffs</h5>
                  <select asp-for="Input.Buff1" id="buffDropdown1" class="form-control select2" style="width:16.5rem;" xonchange="update()">

                    <option value="Attack Up (Lv2)">Attack Up (Lv2)</option>
                    <option value="Attack Up (Lv3)">Attack Up (Lv3)</option>
                    <option value="Bone Weap. Prof.">Bone Weap. Prof.</option>
                    <option value="Hot Weather Attack">Hot Weather Attack</option>
                    <option value="Cold Weather Attack">Cold Weather Attack</option>
                    <option value="Stormy Weather Attack">Stormy Weather Attack</option>
                    <option value="Master Sword Beam Up">Master Sword Beam Up</option>
                  </select>
                </div>

                <!--ARMOR/FOOD BUFF 2-->

                    <option selected>None</option>
                    <option value="Attack Up (Lv1)">Attack Up (Lv1)</option>
                    <option value="Attack Up (Lv2)">Attack Up (Lv2)</option>
                    <option value="Attack Up (Lv3)">Attack Up (Lv3)</option>
                    <option value="Bone Weap. Prof.">Bone Weap. Prof.</option>

                    <option value="Cold Weather Attack">Cold Weather Attack</option>
                    <option value="Stormy Weather Attack">Stormy Weather Attack</option>

                  </select>

                <!--PLAYER CHECKBOXES-->

                  </div>
                </div>

            <!--SPACE BETWEEN SECTIONS-->

            <!--ENEMY SECTION-->
            <div class="col-4 section-enemy" style="height:20%; width:40%; padding-bottom:12px;">

              </div>

                  </div>
                  <!--ENEMY DROPDOWN-->

                    }
                    }

                <!--ENEMY CHECKBOXES-->

                  <!--WEAKENED GIBDO CHECKBOX-->

                  </label>

                  <!--HEADSHOT CHECKBOX-->
                  <div class="form-check">
                    <label class="form-check-label enemy-checkbox d-block" style="color:white;">
                      <input asp-for="Input.Headshot" id="checkboxHeadshot" class="form-check-input" type="checkbox" xonchange="update()" disabled><span id="HeadshotText">Headshot</span>
                    </label>
                  </div>
                  <!--FROZEN CHECKBOX-->
                  <div class="form-check">
                    <label class="form-check-label enemy-checkbox d-block" style="color:white;">
                      <input asp-for="Input.Frozen" id="checkboxFrozen" class="form-check-input" type="checkbox" xonchange="update('frozen')" disabled>Frozen

            </div>

          <!--RESULT-->
          <div class="section-result" style="margin-top:45px; margin-left:-10px; height:fit-content; width:101.5%;">
            <div class="totk-title" style="height:10px; position:relative;">

            </div>

            <div class="row">
              <!--WEAPON RESULT SECTION-->
              <div class="col-md-4" style="margin-left:25px">
                <h5 id="WeaponNameText">Master Sword</h5>
                <!--WEAPON AND FUSE ICON ROW-->
                <div class="row">
                  <!--WEAPON ICON AND ATTACK POWER-->
                  <div class="col-md-auto icon position-relative;" style="width:128px; height:128px; margin-top:6px; margin-left:8px; position:relative; overflow:hidden;">
                    <div class="position-absolute" style="bottom:0; right:0; background-color: rgba(20,20,20,0.6); border-top-left-radius:0.5rem; padding:0.5rem;">
                      <span id="AttackPowerText" style="font-size:1rem;color:white;">30</span>
                    </div>
                    <img src="" id="weaponImage" class="rounded float-left" alt="Weapon Image" style="height:100%; width:100%; object-fit:contain;">
                  </div>
                  <!--FUSE ICON-->
                  <div class="col-md-auto icon" style="width:60px; height:60px; margin-left:3px; margin-top:6px;">
                    <img src="" id="fuseImage" class="rounded float-left" alt="Fuse Image" style="height:100%; width:100%; object-fit:contain;">
                  </div>
                </div>

                <!--PROPERTIES TEXT-->
                <div class="row">
                  <div style="margin-top:6px;margin-left:-26px;">
                    <ul id="PropertiesList"><li>Cut</li></ul>
                  </div>
                </div>
              </div>

              <!--ENEMY RESULT SECTION-->
              <div class="col-md-4" style="margin-left:18px;">
                <h5 class="ml-3" id="EnemyNameText">Chuchu (Small)</h5>
                <!--ENEMY ICON AND HP-->
                <div class="icon position-relative;" style="width:128px; height:128px; margin-top:6px; position:relative; overflow: hidden;">
                  <!--ENEMY DEFEATED TEXT-->
                  <div class="position-absolute" style="left:50%; transform:translate(-50%); top:0; background-color: rgba(20,20,20,0.6); border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; padding-left: 0.5rem; padding-right: 0.5rem;">
                    <span id="DefeatedText" style="color:#FF602B; font-weight:bold;">DEFEATED</span>
                  </div>
                  <!--ENEMY HP-->
                  <div class="position-absolute" style="bottom: 0; right:0; background-color: rgba(20,20,20,0.6); border-top-left-radius: 0.5rem; padding: 0.5rem;">
                    <span id="HPText" class="text-white" style="font-size: 1rem;">10</span>
                  </div>
                  <!--ENEMY ICON-->
                  <img src="" id="enemyImage" class="float-left matched-radius_inner" alt="Enemy Image" style="height:100%; width:100%; object-fit:contain; border-radius: 0.7rem;">
                </div>
              </div>

              <!--DAMAGE OUTPUT SECTION-->
              <div class="col-md-3" style="display:flex; flex-direction:column; align-items:center;">
                <h5>Damage</h5>
                <h1 class="icon" id="DamageOutputText" style="width:128px;height:128px;font-size:42px;background-color:rgba(40, 40, 40, 0.5);display:flex;align-items:center;justify-content:center;margin-top:5px;">30</h1>
                <label id="FullDamageText"></label>
              </div>
            </div>

            <button class="collapsible" xonclick="toggleInfo()" id="toggleInfoButton">Show More Info ▼</button>
            <div class="content" id="contentSection">
              <p id="FormulaText">Formula: BaseAttack(30)</p>
            </div>
          </div>
        </div>

      </main>
    </div>

    <!--FOOTER-->
    <footer class="bg-black border-top footer text-muted">
      <div class="container">
        <style>
          ul.horizontal-list {
              list-style-type: none;
              padding: 0;
              margin: 0;
          }

          ul.horizontal-list li {
              display: inline-block;

          }

          ul.horizontal-list a {
              color: #5be2d4;
              text-decoration: none;
          }
        </style>

        <ul class="horizontal-list">
          <!--<li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdWgQW8VGALbCsqE25iIV-nFlz37l-pYmLtYqz4dm_N9TTzAQ/viewform" target="_blank">Submit Feedback</a></li>-->
          <li><a href="https://github.com/savage13/totk-dc" target="_blank">Github</a> <a href="https://github.com/phil-macrocheira/Philidea" target="_blank">(orig)</a></li>

          <li><a href="https://discord.gg/k4s5KY7ASj" target="_blank">Datamining Discord</a></li>
        </ul>
      </div>
    </footer>
    <script type="module" src="main.js"> </script>

    <script>
      // Armor/Food Buff Dropdown Duplicate Logic
      function updateDropdowns() {
          // Show all options
          $('#buffDropdown1 option, #buffDropdown2 option').show();

          // Hide selected options in the other dropdown
          var selectedValue1 = $('#buffDropdown1').val();
          var selectedValue2 = $('#buffDropdown2').val();

          if (selectedValue1 !== 'None' && selectedValue1.startsWith('Attack Up')) {
              $('#buffDropdown2').find('option[value^="Attack Up"]').not(':selected').hide();
          } else if (selectedValue1 !== 'None') {
              $('#buffDropdown2').find('option[value="' + selectedValue1 + '"]').not(':selected').hide();
          }

          if (selectedValue2 !== 'None' && selectedValue2.startsWith('Attack Up')) {
              $('#buffDropdown1').find('option[value^="Attack Up"]').not(':selected').hide();
          } else if (selectedValue2 !== 'None') {
              $('#buffDropdown1').find('option[value="' + selectedValue2 + '"]').not(':selected').hide();
          }
      }

      $(document).ready(function () {
          $('#buffDropdown1, #buffDropdown2').on('change', function () {
              updateDropdowns();
          });
      });
    </script>

    <script>
      function randomizeWeapon() {
          var dropdown = $('#weaponDropdown');
          var randomIndex = Math.floor(Math.random() * dropdown.children().length);
          dropdown.val(dropdown.children()[randomIndex].value);
          dropdown.trigger('change');
      }
      function randomizeFuse() {
          var dropdown = $('#fuseDropdown');
          var randomIndex = Math.floor(Math.random() * dropdown.children().length);
          dropdown.val(dropdown.children()[randomIndex].value);
          dropdown.trigger('change');
      }
      function randomizeEnemy() {
          var dropdown = $('#enemyDropdown');
          var randomIndex = Math.floor(Math.random() * dropdown.children().length);
          dropdown.val(dropdown.children()[randomIndex].value);
          dropdown.trigger('change');
      }
    </script>

    <!-- @await RenderSectionAsync("Scripts", required: false) -->
  </body>
</html>
